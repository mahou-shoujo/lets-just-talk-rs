<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Let's Just Talk</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }

      html {
        background: black;
        color: whitesmoke;
      }

      body {
        height: 100vh;

        display: flex;
        flex-direction: column;
      }

      #loader {
        position: absolute;
        top: 2ch;
        right: 2ch;

        margin: auto;

        width: 4ch;
        height: 4ch;

        animation: rotation 1s linear infinite;
        border: 0.5ch solid #fff;
        border-bottom-color: transparent;
        border-radius: 50%;
        box-sizing: border-box;
        display: inline-block;
        transition: opacity 1000ms;
      }

      @keyframes rotation {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .error {
        display: flex;
        flex-direction: column;
        gap: 2ch;
        padding: 2ch;
      }

      #participants {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(40ch, 1fr));
        flex: 1;
        gap: 1ch;
        padding: 1ch;
      }

      .card {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border-radius: 1ch;
        gap: 2ch;
        padding: 1ch;
      }

      .name {
        width: 40ch;
        border-radius: 1ch;
        color: black;
        overflow: clip;
        text-align: center;
        text-overflow: ellipsis;
      }

      .name:disabled {
        background: none;
        border: none;
        color: whitesmoke;
      }

      .control {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1ch;
      }

      .control button {
        border: none;
        width: 3ch;
        height: 3ch;
        mask-size: 95%;
      }

      .device {
        mask: url(images/device.svg) no-repeat center;
      }

      .mic {
        mask: url(images/mic.svg) no-repeat center;
      }

      .mic-mute {
        mask: url(images/mic-mute.svg) no-repeat center;
      }

      .vol {
        mask: url(images/vol.svg) no-repeat center;
      }

      .vol-mute {
        mask: url(images/vol-mute.svg) no-repeat center;
      }

      .opaque {
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <template id="templateError">
      <div class="error">
        <h1></h1>
        <h3></h3>
        <pre></pre>
      </div>
    </template>
    <template id="templateParticipant">
      <div class="card">
        <input type="text" class="name" />
        <div class="control">
          <button class="device" title="Select output device"></button>
          <button class="mic"></button>
          <button class="vol"></button>
        </div>
      </div>
    </template>
    <span id="loader"></span>
    <div id="participants"></div>
    <audio id="sink"></audio>
    <script>
      const COLORS = [
        "#8d0033",
        "#76a21e",
        "#134e8e",
        "#631357",
        "#639a67",
        "#71a0a5",
        "#77628c",
        "#bd3246",
      ];

      const NETWORK_PULSE = 500;
      const NETWORK_TTL = 2500;
      const NETWORK_URL =
        window.location.protocol === "file:"
          ? "ws://127.0.0.1:8881"
          : `wss://${window.location.host}${window.location.pathname}/websocket`;

      const AUDIO_SAMPLE_RATE = 48000;
      const AUDIO_SAMPLE_WINDOW = 3;

      const DEFAULT_NAME = "Anonymous";

      class Participant {
        #isMe;
        #isSuppressed;
        #isMuted;
        #isDeafened;
        #id;
        #name;
        #timestamp;

        constructor(isMe, isMuted, isDeafened, id, name) {
          this.#isMe = isMe;
          this.#isSuppressed = false;
          this.#isMuted = isMuted;
          this.#isDeafened = isDeafened;
          this.#id = id;
          this.#name = name;
          this.refresh();
        }

        isMe() {
          return this.#isMe;
        }

        isSuppressed() {
          return this.#isSuppressed;
        }

        setSuppressed(isSuppressed) {
          this.#isSuppressed = isSuppressed;
        }

        isMuted() {
          return this.#isMuted;
        }

        setMuted(isMuted) {
          this.#isMuted = isMuted;
        }

        isDeafened() {
          return this.#isDeafened;
        }

        setDeafened(isDeafened) {
          this.#isDeafened = isDeafened;
        }

        id() {
          return this.#id;
        }

        name() {
          return this.#name;
        }

        rename(name) {
          this.#name = name;
        }

        timestamp() {
          return this.#timestamp;
        }

        refresh() {
          this.#timestamp = new Date();
        }
      }

      class UI {
        #elContainer;
        #elLoader;
        #elParticipants;
        #templateError;
        #templateParticipant;
        #error;

        constructor(elContainer) {
          this.#elContainer = elContainer;
          this.#elLoader = elContainer.querySelector("#loader");
          this.#elParticipants = elContainer.querySelector("#participants");
          this.#templateError = elContainer.querySelector("#templateError");
          this.#templateParticipant = elContainer.querySelector(
            "#templateParticipant",
          );
        }

        updateError(error) {
          UI.#removeAllChildren(this.#elContainer);
          const el = document.importNode(this.#templateError.content, true);
          const elTitle = el.querySelector("h1");
          elTitle.textContent = "Unhandled Exception";
          const elDescription = el.querySelector("h3");
          elDescription.textContent = error;
          const elStack = el.querySelector("pre");
          elStack.textContent = error.stack;
          this.#elContainer.appendChild(el);
        }

        updateLoader(isOnline) {
          if (isOnline) {
            this.#elLoader.classList.add("opaque");
          } else {
            this.#elLoader.classList.remove("opaque");
          }
        }

        updateParticipants() {
          UI.#removeAllChildren(this.#elParticipants);
          let index = 0;
          const elParticipant = this.#createParticipant(me, index++);
          this.#elParticipants.appendChild(elParticipant);
          for (const participant of callee()) {
            const elParticipant = this.#createParticipant(participant, index++);
            this.#elParticipants.appendChild(elParticipant);
          }
        }

        #createParticipant(participant, index) {
          const el = document.importNode(
            this.#templateParticipant.content,
            true,
          );
          this.#updateCard(participant, index, el.querySelector(".card"));
          this.#updateNameControl(participant, el.querySelector(".name"));
          this.#updateDeviceControl(participant, el.querySelector(".device"));
          this.#updateMicControl(participant, el.querySelector(".mic"));
          this.#updateVolControl(participant, el.querySelector(".vol"));
          return el;
        }

        #updateCard(participant, index, el) {
          const color = COLORS[index % COLORS.length];
          el.style.background = `radial-gradient(circle, ${color}, color-mix(in srgb, ${color}, black 35%)`;
        }

        #updateNameControl(participant, el) {
          if (participant.isMe()) {
            el.oninput = () => {
              participant.rename(el.value !== "" ? el.value : DEFAULT_NAME);
            };
          } else {
            el.disabled = true;
          }
          el.placeholder = DEFAULT_NAME;
          el.value = participant.name();
        }

        #updateDeviceControl(participant, el) {
          if (
            participant.isMe() &&
            navigator.mediaDevices.selectAudioOutput !== undefined
          ) {
            el.onclick = async () => {
              try {
                const device = await navigator.mediaDevices.selectAudioOutput();
                audioSetSink(device);
              } catch (error) {
                if (error.name === "NotAllowedError") {
                  return;
                }
                throw error;
              }
            };
          } else {
            el.style.display = "none";
          }
        }

        #updateMicControl(participant, el) {
          if (participant.isMuted()) {
            el.title = "Unmute";
            el.classList.remove("mic");
            el.classList.add("mic-mute");
          } else {
            el.title = "Mute";
            el.classList.remove("mic-mute");
            el.classList.add("mic");
          }
          if (participant.isMe()) {
            el.onclick = () => {
              participant.setMuted(!participant.isMuted());
              audioSetup();
              this.#updateMicControl(participant, el);
            };
          } else {
            el.disabled = true;
          }
        }

        #updateVolControl(participant, el) {
          if (participant.isMe()) {
            if (participant.isDeafened()) {
              el.title = "Unmute";
              el.classList.remove("vol");
              el.classList.add("vol-mute");
            } else {
              el.title = "Mute";
              el.classList.remove("vol-mute");
              el.classList.add("vol");
            }
            el.onclick = () => {
              participant.setDeafened(!participant.isDeafened());
              audioSetup();
              this.#updateVolControl(participant, el);
            };
          } else {
            if (participant.isSuppressed()) {
              el.title = "Unmute";
              el.classList.remove("vol");
              el.classList.add("vol-mute");
            } else {
              el.title = "Mute";
              el.classList.remove("vol-mute");
              el.classList.add("vol");
            }
            el.onclick = () => {
              participant.setSuppressed(!participant.isSuppressed());
              audioSetup();
              this.#updateVolControl(participant, el);
            };
          }
        }

        static #removeAllChildren(container) {
          while (container.lastChild) {
            container.removeChild(container.lastChild);
          }
        }
      }

      let ui = new UI(document.body);

      let error;

      function die(killer) {
        error ??= killer;
        ui.updateError(error);
      }

      window.onerror = (error) => {
        die(error);
      };
      window.onunhandledrejection = (rejection) => {
        die(rejection.reason);
      };

      const HEADER_LENGTH = 36;

      function serializeId(buffer, id) {
        const textEncoder = new TextEncoder();
        const bytes = textEncoder.encode(id);
        const bytesView = new Uint8Array(buffer, 0, HEADER_LENGTH);
        bytesView.set(bytes);
      }

      function serializeData(buffer, data) {
        const audioView = new Float32Array(buffer, HEADER_LENGTH, data.length);
        audioView.set(data);
      }

      function serializePacket(id, data) {
        const buffer = new ArrayBuffer(
          HEADER_LENGTH + data.length * Float32Array.BYTES_PER_ELEMENT,
        );
        serializeId(buffer, id);
        serializeData(buffer, data);
        return buffer;
      }

      function deserializeId(buffer) {
        const textDecoder = new TextDecoder();
        return textDecoder.decode(new Uint8Array(buffer, 0, HEADER_LENGTH));
      }

      function deserializeData(buffer) {
        const offset = buffer.byteLength - HEADER_LENGTH;
        const len = offset / Float32Array.BYTES_PER_ELEMENT;
        return new Float32Array(buffer, HEADER_LENGTH, len);
      }

      function deserializePacket(buffer) {
        return {
          id: deserializeId(buffer),
          data: deserializeData(buffer),
        };
      }

      let websocket;

      function networkSend(id, data) {
        if (websocket?.readyState === WebSocket.OPEN) {
          const buffer = serializePacket(id, data);
          websocket.send(buffer);
        }
      }

      function networkReconnect() {
        console.log("network:reconnect", NETWORK_URL);
        websocket = new WebSocket(NETWORK_URL);
        websocket.binaryType = "arraybuffer";
        websocket.onmessage = (event) => {
          if (event.data instanceof ArrayBuffer) {
            audioReceive(event.data);
          } else {
            const data = JSON.parse(event.data);
            if (
              registerParticipant(
                false,
                data.id,
                data.name,
                data.isMuted,
                data.isDeafened,
              )
            ) {
              ui.updateParticipants();
            }
          }
        };
        websocket.onopen = () => {
          console.log("network:open");
        };
        websocket.onerror = async () => {
          console.log("network:error");
        };
        websocket.onclose = async (event) => {
          console.log("network:close", event.code, event.reason);
          websocket = undefined;
        };
      }

      function networkInstallPulse() {
        setInterval(function () {
          if (unregisterUnresponsiveParticipants()) {
            ui.updateParticipants();
          }
          ui.updateLoader(websocket?.readyState === WebSocket.OPEN);
          if (websocket) {
            if (websocket.readyState === WebSocket.OPEN) {
              websocket.send(
                JSON.stringify({
                  id: me.id(),
                  name: me.name(),
                  isMuted: me.isMuted(),
                  isDeafened: me.isDeafened(),
                }),
              );
            }
          } else {
            networkReconnect();
          }
        }, NETWORK_PULSE);
      }

      function networkSetup() {
        networkReconnect();
        networkInstallPulse();
      }

      networkSetup();

      let audioMediaStream;
      let audioContext;
      let audioSourceEncoderNode;
      let audioSourceNode;
      let audioDestinationNode;
      let audioDestinationDecoderNode;
      let audioSinkDevice;
      let audioSink = document.querySelector("audio");

      async function audioSetSink(maybeAudioSinkDevice) {
        audioSinkDevice = maybeAudioSinkDevice;
        await audioSetup();
      }

      async function audioReceive(buffer) {
        if (audioDestinationDecoderNode) {
          const { id, data } = deserializePacket(buffer);
          const participant = participants.get(id);
          if (participant && !participant.isSuppressed()) {
            audioDestinationDecoderNode.port.postMessage({
              type: "data",
              data,
            });
          }
        }
      }

      async function audioShutdown() {
        if (audioDestinationDecoderNode) {
          audioDestinationDecoderNode.disconnect();
          audioDestinationDecoderNode = undefined;
        }
        if (audioDestinationNode) {
          audioDestinationNode.disconnect();
          audioDestinationNode = undefined;
        }
        if (audioSourceNode) {
          audioSourceNode.disconnect();
          audioSourceNode = undefined;
        }
        if (audioSourceEncoderNode) {
          audioSourceEncoderNode.disconnect();
          audioSourceEncoderNode = undefined;
        }
        if (audioContext) {
          await audioContext.close();
          audioContext = undefined;
        }
        if (audioMediaStream) {
          for (const audioMediaStreamTrack of audioMediaStream.getTracks()) {
            audioMediaStreamTrack.stop();
          }
          audioMediaStream = undefined;
        }
      }

      async function audioSetup() {
        if (audioContext) {
          await audioShutdown();
        }
        try {
          audioMediaStream = await navigator.mediaDevices.getUserMedia({
            audio: {
              channelCount: 1,
              autoGainControl: false,
              echoCancellation: true,
              noiseSuppression: true,
            },
          });
        } catch (error) {
          if (error.name !== "NotAllowedError") {
            throw error;
          } else {
            return;
          }
        }
        audioContext = new AudioContext({ sampleRate: AUDIO_SAMPLE_RATE });
        if (audioContext.sampleRate !== AUDIO_SAMPLE_RATE) {
          throw new Error(
            `Invalid sample rate: expected ${AUDIO_SAMPLE_RATE}, got ${audioContext.sampleRate}`,
          );
        }
        await audioContext.audioWorklet.addModule("audio.js");
        audioSourceEncoderNode = new AudioWorkletNode(
          audioContext,
          "encoder-processor",
        );
        audioSourceEncoderNode.port.onmessage = (event) => {
          networkSend(me.id(), event.data);
        };
        audioSourceNode =
          audioContext.createMediaStreamSource(audioMediaStream);
        if (!me.isMuted()) {
          audioSourceNode.connect(audioSourceEncoderNode);
        }
        audioDestinationNode = audioContext.createMediaStreamDestination();
        audioDestinationDecoderNode = new AudioWorkletNode(
          audioContext,
          "decoder-processor",
        );
        audioDestinationDecoderNode.port.postMessage({
          type: "config",
          sampleRate: AUDIO_SAMPLE_RATE,
          sampleWindow: AUDIO_SAMPLE_WINDOW,
        });
        if (!me.isDeafened()) {
          audioDestinationDecoderNode.connect(audioDestinationNode);
        }
        if (audioSinkDevice) {
          await audioSink.setSinkId(audioSinkDevice.deviceId);
        }
        audioSink.srcObject = audioDestinationNode.stream;
        audioSink.play();
        await audioContext.resume();
      }

      audioSetup();

      const participants = new Map();
      const me = registerParticipant(
        true,
        crypto.randomUUID(),
        DEFAULT_NAME,
        false,
        false,
      );

      function callee() {
        const array = [
          ...participants.values().filter((participant) => !participant.isMe()),
        ];
        return array.sort((a, b) => {
          if (a.name() < b.name()) {
            return -1;
          }
          if (a.name() > b.name()) {
            return 1;
          }
          return 0;
        });
      }

      function registerParticipant(isMe, id, name, isMuted, isDeafened) {
        const old = participants.get(id);
        if (old !== undefined) {
          let isUpdated =
            old.isMuted() !== isMuted ||
            old.isDeafened() !== isDeafened ||
            old.name() !== name;
          old.refresh();
          old.setMuted(isMuted);
          old.setDeafened(isDeafened);
          old.rename(name);
          return isUpdated ? old : undefined;
        } else {
          const participant = new Participant(
            isMe,
            isMuted,
            isDeafened,
            id,
            name,
          );
          participants.set(participant.id(), participant);
          return participant;
        }
      }

      function unregisterUnresponsiveParticipants() {
        let isUpdated = false;
        const now = Date.now();
        for (const participant of callee()) {
          if (now - participant.timestamp() > NETWORK_TTL) {
            participants.delete(participant.id());
            isUpdated = true;
          }
        }
        return isUpdated;
      }

      ui.updateLoader(false);
      ui.updateParticipants();
    </script>
  </body>
</html>
