<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Let's Just Talk</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }

      html {
        background: black;
        color: whitesmoke;
      }

      button {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;

        margin: auto;

        background-color: red;

        width: 15vmax;
        height: 15vmax;
        border-radius: 50%;

        display: inline-flex;
        align-items: center;
        justify-content: center;

        background-color: red;
        border: none;
        cursor: pointer;

        transition:
          background-color 0.2s ease,
          transform 0.1s ease;
      }

      button::before {
        content: "";
        display: block;
        width: 5vmax;
        height: 5vmax;
        background-color: #ffffff;
        border-radius: 50%;
        transition: background-color 0.2s ease;
      }

      button:disabled {
        background-color: gray;
        cursor: not-allowed;
        transform: none;
        animation: none;
      }

      button:disabled::before {
        background-color: darkgray;
      }

      button:not(:disabled):not(.disabled):not(.recording):hover {
        transform: scale(1.05);
      }

      button:not(:disabled):not(.disabled):not(.recording):active {
        transform: scale(0.95);
      }

      button.recording:not(:disabled):not(.disabled) {
        animation: recording-pulse 1.2s infinite cubic-bezier(0.4, 0, 0.2, 1);
      }

      @keyframes recording-pulse {
        0% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(229, 62, 48, 0.6);
        }
        70% {
          transform: scale(1.2);
          box-shadow: 0 0 0 14px rgba(229, 62, 48, 0);
        }
        100% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(229, 62, 48, 0);
        }
      }

      .control {
        display: flex;
        flex-direction: row;
        gap: 2ch;
        padding: 2ch;
      }

      .error {
        display: flex;
        flex-direction: column;
        gap: 2ch;
        padding: 2ch;
      }
    </style>
  </head>
  <body>
    <button></button>
    <div class="control">
      <div>
        <input type="checkbox" id="featureEchoCancellation" checked />
        <label for="featureEchoCancellation">Echo cancellation</label>
      </div>
      <div>
        <input type="checkbox" id="featureNoNoise" checked />
        <label for="featureNoNoise">Noise suppression</label>
      </div>
    </div>
    <script>
      const SAMPLE_RATE = 48000;
      const SAMPLE_WINDOW = 3;

      const button = document.querySelector("button");
      button.onclick = () => run(async () => await record());

      const checkFeatureEchoCancellation = document.querySelector(
        "#featureEchoCancellation",
      );
      const checkFeatureNoNoise = document.querySelector("#featureNoNoise");

      for (const check of [checkFeatureEchoCancellation, checkFeatureNoNoise]) {
        check.onchange = () => {
          run(async () => {
            reload();
          });
        };
      }

      let webSocket;

      function connect() {
        const url = `${location.protocol === "https:" ? "wss" : "ws"}://${window.location.host}${window.location.pathname}/websocket`;
        console.log(`Establishing a connection to ${url}...`);
        webSocket = new WebSocket(url);
        webSocket.binaryType = "arraybuffer";
        webSocket.onerror = (event) => {
          run(async () => {
            console.log("onerror", event);
          });
        };
        webSocket.onclose = (event) => {
          run(async () => {
            console.log("onclose", event.code, event.reason);
            await reconnect();
          });
        };
        webSocket.onmessage = (event) => {
          if (event.data instanceof ArrayBuffer) {
            if (playerNode) {
              playerNode.port.postMessage({
                type: "data",
                data: new Float32Array(event.data),
              });
            }
          }
        };
      }

      async function reconnect() {
        await sleep(1000);
        await connect();
      }

      let audioMediaStream;
      let audioContext;
      let micNode;
      let micSourceNode;
      let playerNode;

      async function reload() {
        if (audioContext) {
          await stop();
          await record();
        }
      }

      let needToSelectOutputDevice =
        navigator.mediaDevices.selectAudioOutput !== undefined;

      async function record() {
        if (audioContext) {
          return await stop();
        }
        try {
          button.disabled = true;
          if (needToSelectOutputDevice) {
            await navigator.mediaDevices.selectAudioOutput();
            needToSelectOutputDevice = false;
          }
          audioMediaStream = await navigator.mediaDevices.getUserMedia({
            audio: {
              channelCount: 1,
              autoGainControl: false,
              echoCancellation: checkFeatureEchoCancellation.checked,
              noiseSuppression: checkFeatureNoNoise.checked,
            },
          });
          audioContext = new AudioContext({ sampleRate: SAMPLE_RATE });
          if (audioContext.sampleRate !== SAMPLE_RATE) {
            throw new Error(
              `Invalid sample rate: expected ${SAMPLE_RATE}, got ${audioContext.sampleRate}`,
            );
          }
          await audioContext.audioWorklet.addModule("/resource/audio.js");
          micNode = new AudioWorkletNode(audioContext, "encoder-processor");
          micNode.port.onmessage = (event) => {
            if (webSocket && webSocket.readyState === WebSocket.OPEN) {
              webSocket.send(event.data);
            }
          };
          micSourceNode =
            audioContext.createMediaStreamSource(audioMediaStream);
          micSourceNode.connect(micNode);
          playerNode = new AudioWorkletNode(audioContext, "decoder-processor");
          playerNode.port.postMessage({
            type: "config",
            sampleRate: SAMPLE_RATE,
            sampleWindow: SAMPLE_WINDOW,
          });
          playerNode.connect(audioContext.destination);
          await audioContext.resume();
          button.classList.add("recording");
          button.disabled = false;
        } catch (error) {
          await stop();
          if (error.name !== "NotAllowedError") {
            throw error;
          }
        }
      }

      async function stop() {
        button.disabled = true;
        button.classList.remove("recording");
        if (playerNode) {
          playerNode.disconnect();
          playerNode = undefined;
        }
        if (micSourceNode) {
          micSourceNode.disconnect();
          micSourceNode = undefined;
        }
        if (micNode) {
          micNode.disconnect();
          micNode = undefined;
        }
        if (audioContext) {
          await audioContext.close();
          audioContext = undefined;
        }
        if (audioMediaStream) {
          for (const audioMediaStreamTrack of audioMediaStream.getTracks()) {
            audioMediaStreamTrack.stop();
          }
          audioMediaStream = undefined;
        }
        button.disabled = false;
      }

      async function run(f) {
        try {
          await f();
        } catch (error) {
          console.error(error);
          while (document.body.lastChild !== null) {
            document.body.removeChild(document.body.lastChild);
          }
          const errorMessage = document.createElement("div");
          errorMessage.classList.add("error");
          const errorMessageHeader = document.createElement("h1");
          errorMessageHeader.textContent = "Unhandled Exception";
          errorMessage.appendChild(errorMessageHeader);
          const errorMessageText = document.createElement("h3");
          errorMessageText.textContent = error;
          errorMessage.appendChild(errorMessageText);
          const errorMessageTextTrace = document.createElement("pre");
          errorMessageTextTrace.textContent = error.stack;
          errorMessage.appendChild(errorMessageTextTrace);
          document.body.appendChild(errorMessage);
        }
      }

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      run(async () => {
        await connect();
      });
    </script>
  </body>
</html>
